server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Chỉ serve React static files
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Health check cho ALB
  location /health {
    return 200 'Healthy';
    add_header Content-Type text/plain;
  }

  # KHÔNG CẦN proxy /api/ hay /uploads
  # ALB đã xử lý routing rồi!
}
